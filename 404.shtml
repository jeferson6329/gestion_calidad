<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Error 404 - No encontrado</title>
  <style>
    body {
      background-color: #f8f8f8;
      color: #333;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
      color: #e74c3c;
    }

    h2 {
      font-size: 2rem;
      margin: 10px 0;
    }

    p {
      font-size: 1.2rem;
      margin: 20px 0;
    }

    a {
      text-decoration: none;
      color: #3498db;
      font-weight: bold;
      transition: color 0.3s;
    }

    a:hover {
      color: #21618c;
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Página no encontrada</h2>
  <p>La página que buscas no existe o ha sido eliminada.</p>
  <a href="/">Volver al inicio</a>
</body>
</html>
